# ===============================
# SERVER
# ===============================
server.port=${PORT:8081}

# ===============================
# DATABASE (Persistent PostgreSQL on Render, H2 for local)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/healthcare}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Let Spring auto-detect the dialect

# ===============================
# H2 CONSOLE
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

